name: Deep Learning Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt update
          sudo apt install -y clang-format
      - name: Run clang-format
        run: |
          find . \( -name "*.cpp" -o -name "*.hpp" -o -name "*.cu" -o -name "*.cuh" -o -name "*.cc" \) \
          -not -path "*/build/*" -not -path "*/extern/*" | xargs clang-format -style=file --dry-run --Werror

  build-and-test:
    needs: format-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda_ver: ["12.4.1-devel-ubuntu22.04"]

    container: nvidia/cuda:${{ matrix.cuda_ver }}

    steps:
      - name: Install System Dependencies
        run: |
          apt update
          apt install -y git cmake clang-tidy cppcheck g++

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include src/ \
          --error-exitcode=1 \
          -I include src/

      - name: Configure and Build (Debug + Sanitizers)
        run: |
          cmake -B build_debug -S . \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUSE_SANITIZERS=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          cmake --build build_debug -j $(nproc)

      - name: Run unit tests (Sanitizers active)
        run: |
          cd build_debug
          ctest --output-on-failure

      - name: Configure and Build (Release + Benchmarks)
        run: |
          cmake -B build_release -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BENCHMARKS=ON \
            -DPRODUCTION=ON
          cmake --build build_release -j $(nproc)

      - name: Check Benchmarks
        run: |
          ./build_release/benchmarks/bench_tensor --benchmark_min_time=0.01 || true
