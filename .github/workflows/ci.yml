name: Deep Learning Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    name: Static Analysis (Format & Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format cppcheck

      - name: Run clang-format
        run: |
          find . \( -name "*.cpp" -o -name "*.hpp" -o -name "*.cu" -o -name "*.cuh" -o -name "*.cc" \) \
          -not -path "*/build/*" -not -path "*/extern/*" | xargs clang-format -style=file --dry-run --Werror

      - name: Run Cppcheck
        run: |
          cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include src/

  build-debug:
    name: Build & Test (Debug)
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git cmake g++ ninja-build ca-certificates

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-debug-cuda12.4

      - name: Configure CMake (Debug)
        run: |
          cmake -B build_debug -S . -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUSE_SANITIZERS=ON \
            -DBUILD_TESTS=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (Debug)
        run: cmake --build build_debug

      - name: Run unit tests
        run: |
          cd build_debug
          ctest --output-on-failure -j $(nproc)

  build-release:
    name: Build & Benchmark (Release)
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git cmake g++ ninja-build ca-certificates

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-release-cuda12.4

      - name: Configure CMake (Release)
        run: |
          cmake -B build_release -S . -G Ninja \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CUDA_COMPILER_LAUNCHER=ccache \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_BENCHMARKS=ON \
            -DPRODUCTION=ON

      - name: Build (Release)
        run: cmake --build build_release

      - name: Check Benchmarks
        run: |
          ./build_release/benchmarks/bench_tensor --benchmark_min_time=0.01 || true
