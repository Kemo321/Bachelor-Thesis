services:
  yolo-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: yolo-bachelor-thesis:latest
    container_name: yolo_dev_container
    
    shm_size: '8gb' 
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - TORCH_CUDA_ARCH_LIST=Auto 

    volumes:
      - .:/app
      - build_cache:/app/build 

    working_dir: /app
    tty: true
    stdin_open: true
    
    command: >
      /bin/bash -c "
      set -e &&
      export PATH=/usr/local/cuda/bin:$$PATH &&
      export LD_LIBRARY_PATH=/usr/local/cuda/lib64:$$LD_LIBRARY_PATH &&
      mkdir -p build && cd build && 
      cmake .. -DUSE_CUDA=ON -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc && 
      make -j$$(nproc) && 
      echo '--- URUCHAMIANIE POTOKÓW ---' &&
      ./benchmarks/short_pipeline_torch &&
      ./benchmarks/short_pipeline_custom &&
      ./benchmarks/train_pipeline_torch &&
      ./benchmarks/train_pipeline_custom &&
      ./benchmarks/bench_torch &&
      ./benchmarks/bench_custom
      "

volumes:
  build_cache: