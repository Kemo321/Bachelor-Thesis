repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i --style=file
        language: system
        types_or: [c++, c, cuda]

      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy -p build
        language: system
        types: [c++]

      - id: cppcheck
        name: cppcheck
        entry: cppcheck --enable=all --suppressions-list=.cppcheck_suppressions --error-exitcode=1 -I include src/
        language: system
        types: [c++]
        pass_filenames: false

      - id: cmake-format
        name: cmake-format
        entry: cmake-format -i
        language: python
        additional_dependencies: [cmakelang]
        files: (CMakeLists\.txt|.*\.cmake)$
